name: keep-warm

# Render's free tier spins the API down after ~15 min idle; the first request after
# a cold start takes ~30-60s. This pings a lightweight endpoint every ~10 min so a
# recruiter opening the live demo hits a warm server. GitHub scheduled crons are
# unreliable on low-activity repos, so this is a BACKUP — the primary keep-warm is an
# external cron-job.org monitor hitting /health every 5 min (see README).
# Override the target with the API_URL repo variable.
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API /health
        run: |
          URL="${API_URL:-https://folio-dev-lo9x.onrender.com}/health"
          echo "Pinging $URL"
          code=$(curl -sS --max-time 90 -o /dev/null -w "%{http_code}" "$URL" || echo "000")
          echo "HTTP $code"
          # A cold start can still be waking up; treat any response as success and
          # only fail on a total connection failure so the schedule keeps running.
          [ "$code" != "000" ]
        env:
          API_URL: ${{ vars.API_URL }}
