services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: openroles
      POSTGRES_USER: openroles
      POSTGRES_PASSWORD: openroles
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openroles"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    environment:
      DATABASE_URL: postgresql+psycopg2://openroles:openroles@db/openroles
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  worker:
    build: ./api
    command: python -m app.ingest.schedule
    environment:
      DATABASE_URL: postgresql+psycopg2://openroles:openroles@db/openroles
    depends_on:
      db:
        condition: service_healthy

  web:
    build: ./web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
