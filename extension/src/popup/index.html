<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="popup.css" />
    <title>Chronicle</title>
  </head>
  <body>
    <header>
      <span class="wordmark">Chronicle</span>
      <span class="status" id="status">Checking…</span>
    </header>

    <section class="actions">
      <button id="fill" class="btn solid">Fill this page</button>
      <button id="save" class="btn outline">Save to Chronicle</button>
      <p class="fillnote">Fills form fields only — it never submits your application.</p>
      <p class="result" id="result"></p>
    </section>

    <details id="conn">
      <summary>Connection</summary>
      <label class="lbl" for="apiBase">API endpoint</label>
      <input id="apiBase" class="input" placeholder="http://localhost:8002" />
      <label class="lbl" for="token">Extension token</label>
      <input id="token" class="input" type="password" placeholder="chr_…" />
      <p class="hint">Get a token from the Chronicle web app → Settings → Browser Extension.</p>
      <button id="connect" class="btn solid full">Save &amp; connect</button>
    </details>
  </body>
  <script src="popup.js"></script>
</html>
